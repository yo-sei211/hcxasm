name: Docker Build

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub Release"
        required: true
        default: false
        type: boolean
      release_tag:
        description: "Release tag to create when release is enabled (example: v2.0.0)"
        required: false
        type: string
      release_name:
        description: "Optional release title"
        required: false
        type: string

jobs:
  build-windows-artifact:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Windows package in Docker
        run: docker compose run --rm builder

      - name: Validate release inputs
        if: inputs.create_release
        shell: bash
        run: |
          if [ -z "${{ inputs.release_tag }}" ]; then
            echo "release_tag is required when create_release is true."
            exit 1
          fi
          case "${{ inputs.release_tag }}" in
            v*) ;;
            *)
              echo "release_tag must start with 'v' (example: v2.0.0)."
              exit 1
              ;;
          esac

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: hcxasm-windows-build
          path: dist/
          if-no-files-found: error

      - name: Create Git tag for release
        if: inputs.create_release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ inputs.release_tag }}';
            const sha = context.sha;
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });
              core.info(`Tag ${tag} already exists. Reusing it.`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha,
              });
              core.info(`Created tag ${tag} at ${sha}.`);
            }

      - name: Publish GitHub Release assets
        if: inputs.create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name || inputs.release_tag }}
          generate_release_notes: true
          files: dist/*.zip
